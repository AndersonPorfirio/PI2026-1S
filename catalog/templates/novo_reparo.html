{% extends "base.html" %}

{% block content %}
<div class="dashboard-container">
    <div class="container" style="max-width: 600px; text-align: left; margin: 0 auto;">
        <h2 style="color: var(--primary);">Cadastrar Novo Reparo</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group-custom">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-novo" style="width: 100%; border: none; cursor: pointer; margin-top: 10px;">SALVAR REPARO</button>
        </form>
        
        <a href="{% url 'index' %}" style="display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none;">Cancelar</a>
    </div>
</div>

<style>
    /* Estilizando os campos que o Django gera no as_p */
    p input, p select, p textarea {
        width: 100%;
        padding: 10px;
        background: #252525;
        border: 1px solid #333;
        border-radius: 6px;
        color: white;
        margin-top: 5px;
        display: block;
        box-sizing: border-box;
    }

    textarea { height: 100px; resize: vertical; }

    label { 
        color: var(--primary); 
        font-weight: bold; 
        font-size: 0.9rem; 
        display: block;
        margin-top: 15px;
    }

    /* Botão de atalho para novo equipamento */
    .btn-atalho {
        font-size: 0.75rem;
        color: var(--primary);
        text-decoration: none;
        float: right;
        margin-top: -25px; /* Alinha com o label */
        border: 1px solid var(--primary);
        padding: 2px 8px;
        border-radius: 4px;
        transition: 0.3s;
    }

    .btn-atalho:hover {
        background: var(--primary);
        color: #000;
    }
</style>

<script>
    // Script para inserir o link de "Novo Equipamento" dinamicamente ao lado do label correto
    document.addEventListener("DOMContentLoaded", function() {
        const labels = document.querySelectorAll('label');
        labels.forEach(label => {
            if (label.innerText.includes("Equipamento")) {
                const link = document.createElement('a');
                link.href = "{% url 'cadastrar_equipamento' %}";
                link.innerText = "+ NOVO EQUIPAMENTO";
                link.className = "btn-atalho";
                label.parentNode.insertBefore(link, label.nextSibling);
            }
        });
    });
</script>
{% endblock %}
